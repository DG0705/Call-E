<!DOCTYPE html>
<html>
<head>
    <title>Call-e Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <a href="/history" class="btn btn-dark mb-3">View Call History</a>

<div class="container mt-5">

    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4">📞 Call-e Enterprise Dashboard</h2>

        <!-- Add Customer -->
        <div class="card mb-4 p-3">
            <h5>Add Customer</h5>
            <form method="post" action="/add_customer" class="row g-3">
                <div class="col-md-5">
                    <input type="text" class="form-control" name="name" placeholder="Customer Name" required>
                </div>
                <div class="col-md-5">
                    <input type="text" class="form-control" name="phone" placeholder="Phone Number" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </div>
            </form>
        </div>

        <!-- Customer List -->
        <div class="card p-3">
            <h5>Customer List</h5>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for customer in customers %}
                    <tr>
                        <td>{{ customer.name }}</td>
                        <td>{{ customer.phone }}</td>
                        <td>
                            <a href="/start_call/{{ customer.id }}" class="btn btn-success btn-sm">
                                Start Call
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>

</div>

</body>
</html>
